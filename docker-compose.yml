services:
  # --- Data Layer ---
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: prism-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - plugins.ml_commons.only_run_on_ml_node=false
      - plugins.neural_search.hybrid_search_disabled=false
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: prism-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    environment:
      - POSTGRES_DB=prism
      - POSTGRES_USER=prism
      - POSTGRES_PASSWORD=prismpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: prism-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Application Layer ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism-api
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - POSTGRES_URL=postgresql://prism:prismpass@postgres:5432/prism
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
    ports:
      - "8000:8000"
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: prism-ui
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  opensearch-data:
  postgres-data:
